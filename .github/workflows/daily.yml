name: Live MLB projections and player props

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      projection_date:
        description: Projection date in YYYY-MM-DD; blank uses today in New York
        required: false
        type: string
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mlb-live-pages
  cancel-in-progress: true

jobs:
  project:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve projection date
        id: projection-date
        shell: bash
        run: |
          REQUESTED="${{ inputs.projection_date }}"
          if [ -n "$REQUESTED" ]; then
            TARGET_DATE="$REQUESTED"
          else
            TARGET_DATE=$(TZ=America/New_York date +%F)
          fi
          echo "date=$TARGET_DATE" >> "$GITHUB_OUTPUT"

      - name: Restore live-data cache
        id: live-cache
        uses: actions/cache/restore@v4
        with:
          path: data/cache
          key: mlb-live-v3-${{ runner.os }}-${{ steps.projection-date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            mlb-live-v3-${{ runner.os }}-${{ steps.projection-date.outputs.date }}-
            mlb-live-v3-${{ runner.os }}-

      - name: Validate source and prop utilities
        shell: bash
        run: |
          python -m compileall -q src scripts
          PYTHONPATH=src pytest -q
          python - <<'PY'
          import sys
          import pandas as pd
          sys.path.insert(0, 'src')
          from mlb_projection.advanced_features import attach_advanced_features
          from mlb_projection.odds import probability_to_american, expected_value_per_unit
          from mlb_projection.player_props import default_prop_line
          from mlb_projection.prop_odds import normalize_player_name
          assert probability_to_american(0.60) == -150
          assert expected_value_per_unit(0.60, -110) > 0
          assert default_prop_line('batter_hits', 1.1) == 0.5
          assert default_prop_line('batter_total_bases', 1.9) == 1.5
          assert normalize_player_name('José Ramírez') == 'jose ramirez'
          games = pd.DataFrame({
              'game_pk':[1], 'game_datetime':['2026-07-17T23:00:00Z'],
              'home_team':['NYY'], 'away_team':['BOS'],
              'home_probable_pitcher_id':[123.0], 'away_probable_pitcher_id':[456.0],
          })
          starters = pd.DataFrame({
              'pitcher_id':pd.Series([123,456], dtype='int64'),
              'snapshot_time':['2026-07-16T00:00:00Z','2026-07-16T00:00:00Z'],
              'starter_xwoba_allowed':[.30,.32],
              'starter_k_minus_bb':[.18,.12],
              'starter_projected_innings':[5.8,5.2],
          })
          result = attach_advanced_features(games, starter_snapshots=starters)
          assert result['starter_k_minus_bb_diff'].notna().all()
          PY

      - name: Pull real MLB, Statcast, and historical forecast data
        run: python scripts/prepare_live_stage2.py --date "${{ steps.projection-date.outputs.date }}"

      - name: Save prepared live-data cache
        uses: actions/cache/save@v4
        with:
          path: data/cache
          key: mlb-live-v3-${{ runner.os }}-${{ steps.projection-date.outputs.date }}-${{ github.run_id }}

      - name: Train and project current slate
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          ODDS_REGION: us
        shell: bash
        run: |
          mkdir -p outputs
          set -o pipefail
          python scripts/run_stage2.py --date "${{ steps.projection-date.outputs.date }}" 2>&1 | tee outputs/run.log

      - name: Train and project player props
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          ODDS_REGION: us
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_player_props.py --date "${{ steps.projection-date.outputs.date }}" 2>&1 | tee outputs/props-run.log

      - name: Assemble Pages site
        shell: bash
        run: |
          mkdir -p site
          cp outputs/index.html site/index.html
          cp outputs/projections.csv site/projections.csv
          cp outputs/metrics.json site/metrics.json
          cp outputs/metadata.json site/metadata.json
          cp outputs/props.html site/props.html
          cp outputs/player_props.csv site/player_props.csv
          cp outputs/prop_metrics.json site/prop_metrics.json
          cp outputs/prop_metadata.json site/prop_metadata.json
          touch site/.nojekyll

      - name: Upload projection files and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-projections-${{ steps.projection-date.outputs.date }}
          path: outputs/
          if-no-files-found: warn

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publish dashboard
        id: deployment
        uses: actions/deploy-pages@v4
